"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "npm ci"
archive = "apps/macos/scripts/manage-workspace-app.sh terminate \"$CONDUCTOR_WORKSPACE_PATH/apps/macos/dist/Limit Lifeboat.app/Contents/MacOS/LimitLifeboat\""
run_mode = "concurrent"

[scripts.run.site]
command = "npm run dev --workspace=@limit-lifeboat/site -- --host 0.0.0.0 --port \"$CONDUCTOR_PORT\""
default = true
icon = "globe"
